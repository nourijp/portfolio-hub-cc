<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hamed Nouri — Portfolio Hub</title>
  <meta name="description" content="Central directory for Hamed Nouri's portfolio subdomains with live status monitoring." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #f8fafc;
      --surface:    #ffffff;
      --border:     #e2e8f0;
      --text:       #0f172a;
      --muted:      #64748b;
      --accent:     #3b82f6;
      --radius:     12px;

      /* status badge tokens */
      --live-bg:        #dcfce7; --live-text:       #166534;
      --slow-bg:        #fef9c3; --slow-text:       #854d0e;
      --redirecting-bg: #dbeafe; --redirecting-text:#1e40af;
      --warning-bg:     #ffedd5; --warning-text:    #9a3412;
      --down-bg:        #fee2e2; --down-text:       #b91c1c;
      --planned-bg:     #f1f5f9; --planned-text:    #475569;
      --unknown-bg:     #f1f5f9; --unknown-text:    #64748b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 56px 24px 40px;
      text-align: center;
    }
    header h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -.03em; margin-bottom: 12px; }
    header p { color: var(--muted); font-size: 1.05rem; max-width: 560px; margin: 0 auto 24px; }

    /* ── Status bar ── */
    #status-bar {
      display: flex; align-items: center; justify-content: center; gap: 16px; flex-wrap: wrap;
      font-size: .85rem; color: var(--muted);
      padding: 0 24px 32px;
    }
    #status-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; display: inline-block; margin-right: 6px; }
    #status-bar .dot.live { background: #22c55e; }
    #status-bar .dot.checking { background: #f59e0b; animation: pulse 1.2s infinite; }
    #status-bar .dot.error { background: #ef4444; }
    #refresh-btn {
      background: var(--accent); color: #fff; border: none; border-radius: 6px;
      padding: 5px 14px; font-size: .82rem; cursor: pointer; font-family: inherit;
      transition: opacity .15s;
    }
    #refresh-btn:hover { opacity: .85; }
    #refresh-btn:disabled { opacity: .5; cursor: not-allowed; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* external status link */
    .ext-status-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .82rem; color: var(--accent); text-decoration: none;
      border: 1px solid var(--border); border-radius: 6px; padding: 4px 12px;
      transition: background .15s;
    }
    .ext-status-link:hover { background: #eff6ff; }

    /* ── Main layout ── */
    main { max-width: 1200px; margin: 0 auto; padding: 48px 24px 80px; }

    /* ── Category ── */
    .category-section { margin-bottom: 56px; }
    .category-header { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .category-header h2 { font-size: 1.35rem; font-weight: 700; }
    .cat-count { font-size: .8rem; color: var(--muted); background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; }

    /* ── Grid ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }

    /* ── Card ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px;
      display: flex; flex-direction: column;
      transition: box-shadow .2s, transform .2s;
    }
    .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.08); transform: translateY(-2px); }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
    .card-title { font-size: 1rem; font-weight: 700; line-height: 1.3; flex: 1; }
    .card-url { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: .78rem; color: var(--accent); margin-bottom: 10px; word-break: break-all; }
    .card-desc { color: var(--muted); font-size: .88rem; line-height: 1.55; flex: 1; margin-bottom: 18px; }

    /* ── Status badge ── */
    .badge {
      font-size: .68rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .badge-live        { background: var(--live-bg);        color: var(--live-text); }
    .badge-slow        { background: var(--slow-bg);        color: var(--slow-text); }
    .badge-redirecting { background: var(--redirecting-bg); color: var(--redirecting-text); }
    .badge-warning     { background: var(--warning-bg);     color: var(--warning-text); }
    .badge-down        { background: var(--down-bg);        color: var(--down-text); }
    .badge-planned     { background: var(--planned-bg);     color: var(--planned-text); }
    .badge-unknown     { background: var(--unknown-bg);     color: var(--unknown-text); }

    /* ── Response time pill ── */
    .response-ms { font-size: .72rem; color: var(--muted); margin-left: 6px; }

    /* ── Buttons ── */
    .btn {
      display: block; width: 100%; padding: 9px 14px; text-align: center;
      border-radius: 7px; font-size: .88rem; font-weight: 600;
      text-decoration: none; transition: all .15s;
    }
    .btn-visit  { background: var(--text); color: #fff; }
    .btn-visit:hover { background: #1e293b; }
    .btn-planned { background: var(--bg); color: var(--muted); border: 1px solid var(--border); pointer-events: none; }

    /* ── Footer ── */
    footer {
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 32px 24px; text-align: center;
    }
    .footer-links { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 12px; }
    .footer-links a { color: var(--accent); text-decoration: none; font-size: .88rem; }
    .footer-links a:hover { text-decoration: underline; }
    footer p { color: var(--muted); font-size: .82rem; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      header h1 { font-size: 1.6rem; }
    }
  </style>
</head>

  <div id="status-bar">

// ── Status API endpoint (GitHub Actions–generated status.json) ────────────────
const STATUS_JSON_URL = "/status.json";

let statusMap = {};   // url → { status, responseMs, httpStatus }
let lastChecked = null;

// ── On load ──────────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  renderCards(); // render immediately with "unknown" badges
  loadStatus();  // then fetch real status
});

// ── Load status.json ─────────────────────────────────────────────────────────
async function loadStatus() {
  const btn = document.getElementById("refresh-btn");
  const dot = document.getElementById("status-dot");
  const msg = document.getElementById("status-msg");

  btn.disabled = true;
  dot.className = "dot checking";
  msg.innerHTML = `<span class="dot checking" id="status-dot"></span> Checking live status…`;

  try {
    const res = await fetch(STATUS_JSON_URL + "?t=" + Date.now(), { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    if (data.checkedAt) {
      lastChecked = new Date(data.checkedAt);
      const diffMinutes = (Date.now() - lastChecked.getTime()) / 60000;
      
      // Handle staleness (> 20 mins)
      if (diffMinutes > 20) {
        msg.innerHTML = `<span class="dot warning" id="status-dot"></span> Status unavailable (stale data)`;
        // Data is stale, but we still render what we have or mark them unknown?
        // Requirements say: "If status.json is stale... show 'Status unavailable' or 'Last checked unavailable.' Do not mark every site as down."
        // We'll leave the cards as unknown.
        statusMap = {};
        for (const site of data.sites || []) {
          statusMap[normalizeUrl(site.url)] = { ...site, status: "unknown" };
        }
      } else {
        statusMap = {};
        for (const site of data.sites || []) {
          statusMap[normalizeUrl(site.url)] = site;
        }
        const timeStr = lastChecked.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        msg.innerHTML = `<span class="dot live" id="status-dot"></span> Live status loaded · last checked ${timeStr}`;
      }
    } else {
      throw new Error("Missing checkedAt");
    }

    renderCards();
  } catch (err) {
    msg.innerHTML = `<span class="dot error" id="status-dot"></span> Status unavailable`;
    statusMap = {}; // Mark all unknown
    renderCards();
    console.warn("Status fetch failed:", err);
  } finally {
    btn.disabled = false;
  }
}

// ── Render all categories and cards ──────────────────────────────────────────
function renderCards() {
  const main = document.getElementById("main-content");
  main.innerHTML = "";

  for (const [catKey, cat] of Object.entries(CATEGORIES)) {
    const section = document.createElement("section");
    section.className = "category-section";

    const sitesWithStatus = cat.sites.map(s => ({
      ...s,
      _status: statusMap[normalizeUrl(s.url)] || null
    }));

    section.innerHTML = `
      <div class="category-header">
        <div>
          <h2>${cat.label}</h2>
          <p style="color:var(--muted);font-size:.85rem;margin-top:4px">${cat.desc}</p>
        </div>
        <span class="cat-count">${cat.sites.length} sites</span>
      </div>
      <div class="grid" id="grid-${catKey}"></div>
    `;
    main.appendChild(section);

    const grid = section.querySelector(`#grid-${catKey}`);
    for (const site of sitesWithStatus) {
      grid.appendChild(buildCard(site));
    }
  }
}

// ── Build a single card ───────────────────────────────────────────────────────
function buildCard(site) {
  const st = site._status;
  const status = st ? st.status : "unknown";
  const ms     = st ? st.responseMs : null;
  const http   = st ? st.httpStatus : null;

  const { badgeClass, badgeLabel, canVisit } = statusMeta(status);

  const msLabel = (ms != null && status !== "down")
    ? `<span class="response-ms">${ms}ms</span>` : "";

  const btnHtml = canVisit
    ? `<a href="${site.url}" class="btn btn-visit" target="_blank" rel="noopener">Visit →</a>`
    : `<span class="btn btn-planned">Unavailable</span>`;

  const card = document.createElement("div");
  card.className = "card";
  card.setAttribute("data-url", site.url);
  card.innerHTML = `
    <div class="card-top">
      <h3 class="card-title">${esc(site.name)}</h3>
      <span class="badge ${badgeClass}" title="${http ? 'HTTP ' + http : ''}">${badgeLabel}${msLabel}</span>
    </div>
    <div class="card-url">${esc(site.url)}</div>
    <p class="card-desc">${esc(site.desc)}</p>
    ${btnHtml}
  `;
  return card;
}

// ── Status metadata ───────────────────────────────────────────────────────────
function statusMeta(status) {
  const map = {
    live:        { badgeClass: "badge-live",        badgeLabel: "Live",        canVisit: true  },
    slow:        { badgeClass: "badge-slow",        badgeLabel: "Slow",        canVisit: true  },
    redirecting: { badgeClass: "badge-redirecting", badgeLabel: "Redirecting", canVisit: true  },
    warning:     { badgeClass: "badge-warning",     badgeLabel: "Warning",     canVisit: true  },
    down:        { badgeClass: "badge-down",        badgeLabel: "Down",        canVisit: false },
    planned:     { badgeClass: "badge-planned",     badgeLabel: "Planned",     canVisit: false },
    unknown:     { badgeClass: "badge-unknown",     badgeLabel: "—",           canVisit: true  },
  };
  return map[status] || map["unknown"];
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function normalizeUrl(url) {
  return url.replace(/\/$/, "").toLowerCase();
}
function esc(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
